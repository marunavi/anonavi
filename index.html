<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>質問管理システム v3.0</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#3D78F2;--bl:#E8F0FF;--purple:#7C3AED;--pl:#F3E8FF;--green:#059669;--gl:#ECFDF5;--orange:#D97706;--ol:#FEF3C7;--red:#DC2626;--rl:#FEE2E2;--bg:#F7F8FA;--w:#fff;--t:#1a1a1a;--s:#6B7280;--b:#E5E7EB;--r:12px;--sh:0 1px 3px rgba(0,0,0,.06)}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--t);line-height:1.7;font-size:14px}
.app{max-width:1280px;margin:0 auto;padding:16px 20px}
.hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.hd h1{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.hd h1 em{font-style:normal;background:var(--blue);color:#fff;font-size:10px;padding:2px 8px;border-radius:20px}
.ha{display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:.15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn:active{transform:scale(.97)}
.bp{background:var(--blue);color:#fff}.bp:hover{background:#2D5FD6}
.bg{background:var(--green);color:#fff}
.br{background:var(--red);color:#fff}
.bo{background:var(--w);color:var(--t);border:1px solid var(--b)}.bo:hover{background:#F3F4F6}
.bs{padding:5px 9px;font-size:11px}
.tabs{display:flex;gap:2px;margin-bottom:16px;border-bottom:2px solid var(--b);overflow-x:auto}
.tab{padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--s);border-bottom:3px solid transparent;margin-bottom:-2px;transition:.2s;white-space:nowrap}
.tab.on{color:var(--blue);border-bottom-color:var(--blue)}.tab:hover{color:var(--blue)}
.tp{display:none}.tp.on{display:block}
/* Cards */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.cd{background:var(--w);border-radius:var(--r);padding:18px;box-shadow:var(--sh)}
.cd h3{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.sn{font-size:28px;font-weight:700;color:var(--blue)}.sl{font-size:11px;color:var(--s)}
/* Stats */
.sts{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.st{background:var(--w);border-radius:var(--r);padding:12px 16px;box-shadow:var(--sh);min-width:100px;flex:1}
.st .n{font-size:22px;font-weight:700;color:var(--blue)}.st .l{font-size:10px;color:var(--s)}
/* Filters */
.flt{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.fi{padding:7px 10px;border:1px solid var(--b);border-radius:8px;font-size:12px;font-family:inherit;outline:none;background:var(--w)}
.fi:focus{border-color:var(--blue)}select.fi{min-width:100px}
/* Table */
.tw{background:var(--w);border-radius:var(--r);box-shadow:var(--sh);overflow-x:auto;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#F9FAFB;padding:8px 10px;text-align:left;font-weight:600;font-size:11px;color:var(--s);border-bottom:1px solid var(--b);white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--blue)}
td{padding:8px 10px;border-bottom:1px solid #F3F4F6;vertical-align:middle}
tr:hover{background:#FAFBFF}
.qt{max-width:300px;line-height:1.5}
.bd{display:inline-block;padding:1px 7px;border-radius:20px;font-size:10px;font-weight:600}
.bd-c{background:var(--bl);color:var(--blue)}.bd-x{background:var(--gl);color:var(--green)}.bd-on{background:var(--gl);color:var(--green)}.bd-off{background:var(--rl);color:var(--red)}.bd-draft{background:var(--ol);color:#92400E}.bd-pub{background:var(--gl);color:var(--green)}.bd-sc{background:var(--pl);color:var(--purple)}
.acts{display:flex;gap:3px;white-space:nowrap}
.cb{width:16px;height:16px;cursor:pointer;accent-color:var(--blue)}
.pg{display:flex;align-items:center;justify-content:space-between;padding:6px 0;font-size:12px;color:var(--s)}
.pgb{display:flex;gap:3px}
.pgn{width:28px;height:28px;border-radius:6px;border:1px solid var(--b);background:var(--w);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px}
.pgn.on{background:var(--blue);color:#fff;border-color:var(--blue)}
/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:none;align-items:center;justify-content:center;padding:16px}
.mo.open{display:flex}
.md{background:var(--w);border-radius:16px;padding:24px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.md h2{font-size:16px;font-weight:700;margin-bottom:16px}
.fg{margin-bottom:12px}.fg label{display:block;font-size:11px;font-weight:600;color:var(--s);margin-bottom:3px}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 10px;border:1px solid var(--b);border-radius:8px;font-size:13px;font-family:inherit;outline:none}
.fg textarea{height:70px;resize:vertical}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--blue)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.ma{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
/* Bulk */
.bulk{background:var(--bl);border-radius:var(--r);padding:10px 16px;margin-bottom:12px;display:none;align-items:center;gap:10px;flex-wrap:wrap}
.bulk.show{display:flex}.bulk span{font-size:12px;font-weight:600;color:var(--blue)}
/* Bar chart */
.bar-r{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-l{width:90px;font-size:11px;text-align:right;color:var(--s);flex-shrink:0}
.bar-t{flex:1;background:#F3F4F6;border-radius:3px;height:18px;overflow:hidden}
.bar-f{height:100%;border-radius:3px;transition:.3s;min-width:2px}
.bar-v{width:35px;font-size:11px;font-weight:700;text-align:right}
/* Quality */
.qi{padding:10px 14px;border-bottom:1px solid #F3F4F6;display:flex;align-items:flex-start;gap:10px;font-size:12px}
.qi:last-child{border-bottom:none}
.qi-icon{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px}
.qi-warn{background:var(--ol);color:var(--orange)}.qi-err{background:var(--rl);color:var(--red)}.qi-ok{background:var(--gl);color:var(--green)}
.qi-id{color:var(--s);font-family:monospace;font-size:11px;min-width:80px}
/* Test */
.tq{background:var(--w);border-radius:var(--r);padding:20px;margin-bottom:12px;box-shadow:var(--sh)}
.tq-num{font-size:11px;color:var(--s);margin-bottom:4px}
.tq-text{font-size:15px;font-weight:600;line-height:1.7;margin-bottom:14px}
.tq-opts{display:flex;gap:8px}
.tq-opt{flex:1;padding:12px;border-radius:10px;border:2px solid var(--b);text-align:center;font-size:13px;font-weight:600;cursor:pointer;transition:.2s}
.tq-opt:hover{border-color:var(--blue);background:var(--bl)}
.tq-opt.sel{border-color:var(--blue);background:var(--bl);color:var(--blue)}
.tq-progress{height:4px;background:#F3F4F6;border-radius:2px;margin-bottom:20px;overflow:hidden}
.tq-progress-bar{height:100%;background:var(--blue);border-radius:2px;transition:.3s}
/* Result type */
.rt{background:var(--w);border-radius:var(--r);padding:16px;box-shadow:var(--sh);margin-bottom:12px;border-left:4px solid}
.rt h3{font-size:14px;font-weight:700;margin-bottom:4px}
.rt-d{font-size:12px;color:var(--s);line-height:1.6;margin-bottom:8px}
.rt-tips{list-style:none}.rt-tips li{font-size:12px;padding:3px 0;display:flex;align-items:flex-start;gap:6px}.rt-tips li::before{content:'✓';color:var(--green);font-weight:700}
.rt-str{display:flex;gap:6px;margin-top:8px}.rt-str span{background:var(--bl);color:var(--blue);padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600}
/* Ring chart (CSS only) */
.ring{width:120px;height:120px;border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center;margin:0 auto 8px}
.ring-val{font-size:20px;font-weight:700;color:var(--blue)}
@media(max-width:768px){.g2,.g3,.g4,.g5,.fr,.fr3{grid-template-columns:1fr}.flt{flex-direction:column}.fi{width:100%}}
</style>
</head>
<body>
<div class="app">
<div class="hd">
  <h1>📋 質問管理システム <em>v3.0</em></h1>
  <div class="ha">
    <button class="btn bo" onclick="exportCSV()">📥 CSV</button>
    <button class="btn bo" onclick="exportJSON()">💾 JSON</button>
    <button class="btn bo" onclick="$('jsonIn').click()">📂 読込</button>
    <input type="file" id="jsonIn" accept=".json" style="display:none" onchange="importJSON(event)">
  </div>
</div>
<div class="tabs">
  <button class="tab on" onclick="sw('dash',this)">📊 Dashboard</button>
  <button class="tab" onclick="sw('list',this)">📋 質問一覧</button>
  <button class="tab" onclick="sw('qc',this)">✅ 品質チェック</button>
  <button class="tab" onclick="sw('test',this)">🎯 出題テスト</button>
  <button class="tab" onclick="sw('rt',this)">🏆 結果タイプ</button>
  <button class="tab" onclick="sw('cat',this)">🏷 カテゴリ</button>
</div>

<!-- ===== DASHBOARD ===== -->
<div class="tp on" id="p-dash">
<div class="g5" id="dashStats"></div>
<div style="height:14px"></div>
<div class="g2">
  <div class="cd"><h3>📊 カテゴリ別分布</h3><div id="dashCat"></div></div>
  <div class="cd"><h3>🎯 スコープ配分</h3><div id="dashScope"></div><div id="dashScopeTarget" style="margin-top:10px"></div></div>
</div>
<div style="height:14px"></div>
<div class="g2">
  <div class="cd"><h3>🏷 コンテキスト別</h3><div id="dashCtx"></div></div>
  <div class="cd"><h3>📋 ステータス</h3><div id="dashStatus"></div></div>
</div>
<div style="height:14px"></div>
<div class="g2">
  <div class="cd"><h3>🏢 環境別（上位15）</h3><div id="dashEnv"></div></div>
  <div class="cd"><h3>👥 関係別（上位15）</h3><div id="dashRel"></div></div>
</div>
</div>

<!-- ===== LIST ===== -->
<div class="tp" id="p-list">
<div class="sts" id="stsBar"></div>
<div class="bulk" id="bulkBar">
  <span id="bulkCount">0件選択中</span>
  <button class="btn bo bs" onclick="bulkSt('published')">公開</button>
  <button class="btn bo bs" onclick="bulkSt('draft')">下書き</button>
  <button class="btn bo bs" onclick="bulkEn(true)">有効</button>
  <button class="btn bo bs" onclick="bulkEn(false)">無効</button>
  <select class="fi" id="bCat" style="font-size:11px;padding:4px 8px"><option value="">カテゴリ変更</option></select>
  <button class="btn bo bs" onclick="applyBCat()">適用</button>
  <button class="btn br bs" onclick="bulkDel()">一括削除</button>
  <button class="btn bo bs" onclick="clrSel()">解除</button>
</div>
<div class="flt">
  <input class="fi" style="min-width:200px" type="search" placeholder="🔍 質問を検索..." id="sI" oninput="render()">
  <select class="fi" id="fCat" onchange="render()"><option value="">全カテゴリ</option></select>
  <select class="fi" id="fCtx" onchange="render()"><option value="">全対象</option><option value="all">共通</option><option value="work">職場</option><option value="family">家族</option><option value="school">学校</option><option value="friend">友人</option><option value="service">ｻｰﾋﾞｽ</option><option value="shared">共同</option></select>
  <select class="fi" id="fSc" onchange="render()"><option value="">全ｽｺｰﾌﾟ</option><option value="common">共通</option><option value="relationship">関係</option><option value="environment">環境</option></select>
  <select class="fi" id="fStat" onchange="render()"><option value="">全状態</option><option value="published">公開</option><option value="draft">下書</option></select>
  <button class="btn bp" onclick="openModal()">＋ 追加</button>
</div>
<div class="tw"><table><thead><tr>
  <th style="width:30px"><input type="checkbox" class="cb" id="selAll" onchange="togAll(this.checked)"></th>
  <th onclick="srt('id')" style="width:55px">ID</th>
  <th onclick="srt('question')">質問文</th>
  <th onclick="srt('category')" style="width:90px">カテゴリ</th>
  <th onclick="srt('scope')" style="width:60px">ｽｺｰﾌﾟ</th>
  <th onclick="srt('context_group')" style="width:55px">対象</th>
  <th onclick="srt('weight')" style="width:40px">重み</th>
  <th onclick="srt('status')" style="width:50px">公開</th>
  <th style="width:110px">操作</th>
</tr></thead><tbody id="tBody"></tbody></table></div>
<div class="pg" id="pgn"></div>
</div>

<!-- ===== QUALITY CHECK ===== -->
<div class="tp" id="p-qc">
<div class="g4" id="qcStats"></div>
<div style="height:14px"></div>
<div class="flt">
  <button class="btn bp" onclick="runQC()">🔍 品質チェック実行</button>
  <select class="fi" id="qcFilter" onchange="filterQC()"><option value="all">全て表示</option><option value="error">エラーのみ</option><option value="warn">警告のみ</option><option value="ok">問題なし</option></select>
</div>
<div class="cd" id="qcResults"><p style="text-align:center;color:var(--s);padding:30px">「品質チェック実行」を押してください</p></div>
</div>

<!-- ===== DELIVERY TEST ===== -->
<div class="tp" id="p-test">
<div id="testSetup">
  <div class="cd" style="margin-bottom:14px">
    <h3>🎯 出題テスト</h3>
    <p style="font-size:12px;color:var(--s);margin-bottom:14px">条件を選択して、実際の出題を体験できます。回答すると結果タイプが表示されます。</p>
    <div class="fr3">
      <div class="fg"><label>コンテキスト</label><select class="fi" id="ttCtx" style="width:100%"><option value="work">職場</option><option value="family">家族</option><option value="school">学校</option><option value="friend">友人</option><option value="shared">共同生活</option></select></div>
      <div class="fg"><label>私の立場</label><select class="fi" id="ttMy" style="width:100%"><option value="上司">上司</option><option value="部下">部下</option><option value="同僚">同僚</option><option value="親">親</option><option value="配偶者">配偶者</option><option value="先生">先生</option><option value="友人">友人</option></select></div>
      <div class="fg"><label>環境</label><select class="fi" id="ttEnv" style="width:100%"><option value="飲食">飲食店</option><option value="接客">接客</option><option value="オフィス">オフィス</option><option value="工場">工場</option><option value="医療">医療</option><option value="IT">IT</option><option value="美容">美容</option><option value="教育">教育</option><option value="家庭">家庭</option><option value="建設">建設</option></select></div>
    </div>
    <button class="btn bp" onclick="startTest()">20問で出題テスト開始</button>
  </div>
</div>
<div id="testArea" style="display:none">
  <div class="tq-progress"><div class="tq-progress-bar" id="testProg"></div></div>
  <div id="testQ"></div>
  <div id="testNav" style="display:flex;gap:8px;margin-top:12px">
    <button class="btn bo" onclick="prevTestQ()">← 前へ</button>
    <span id="testCount" style="flex:1;text-align:center;font-size:13px;color:var(--s);line-height:36px"></span>
    <button class="btn bp" id="testNextBtn" onclick="nextTestQ()">次へ →</button>
  </div>
</div>
<div id="testResult" style="display:none"></div>
</div>

<!-- ===== RESULT TYPES ===== -->
<div class="tp" id="p-rt"><div id="rtCards"></div></div>

<!-- ===== CATEGORIES ===== -->
<div class="tp" id="p-cat">
<div class="cd"><h3>🏷 カテゴリ管理</h3><div id="catList"></div>
<div style="margin-top:14px;display:flex;gap:8px"><input class="fi" id="newCat" placeholder="新しいカテゴリ名"><button class="btn bp" onclick="addCat()">追加</button></div>
</div></div>
</div>

<!-- MODAL -->
<div class="mo" id="modal" onclick="if(event.target===this)closeModal()">
<div class="md">
  <h2 id="mTitle">質問追加</h2><input type="hidden" id="eId">
  <div class="fg"><label>質問文 *</label><textarea id="fQ" placeholder="観察可能な行動を具体的に記述"></textarea></div>
  <div class="fr"><div class="fg"><label>カテゴリ</label><select id="fCt"></select></div><div class="fg"><label>サブカテゴリ</label><input id="fSub"></div></div>
  <div class="fr3"><div class="fg"><label>スコープ</label><select id="fSp"><option value="common">共通</option><option value="relationship">関係</option><option value="environment">環境</option></select></div><div class="fg"><label>コンテキスト</label><select id="fCx"><option value="all">共通</option><option value="work">職場</option><option value="family">家族</option><option value="school">学校</option><option value="friend">友人</option><option value="service">ｻｰﾋﾞｽ</option><option value="shared">共同</option></select></div><div class="fg"><label>環境</label><input id="fEv" value="all"></div></div>
  <div class="fr3"><div class="fg"><label>私の立場</label><input id="fMr" value="all"></div><div class="fg"><label>相手の立場</label><input id="fTr" value="all"></div><div class="fg"><label>重み</label><input id="fWt" type="number" min="1" max="5" value="3"></div></div>
  <div class="fr"><div class="fg"><label>ステータス</label><select id="fSt"><option value="published">公開</option><option value="draft">下書き</option></select></div><div class="fg"><label>有効/無効</label><select id="fEn"><option value="true">有効</option><option value="false">無効</option></select></div></div>
  <div class="fg"><label>結果マッピング（JSON）</label><textarea id="fRm" style="height:50px;font-family:monospace;font-size:11px"></textarea></div>
  <div class="ma"><button class="btn bo" onclick="closeModal()">キャンセル</button><button class="btn bp" onclick="saveQ()">保存</button></div>
</div></div>

<script>
const $=id=>document.getElementById(id);
let Q=[],sel=new Set(),sc='display_order',sd=1,cp=1,PS=25;
const CL={all:'共通',work:'職場',family:'家族',school:'学校',friend:'友人',service:'ｻｰﾋﾞｽ',shared:'共同'};
const SL={common:'共通',relationship:'関係',environment:'環境'};
let RT=__RT__;let qcData=[];let testQs=[],testAns={},testIdx=0;

function init(){const s=localStorage.getItem('bt_q3');Q=s?JSON.parse(s):__Q__;buildCF();render();renderDash();renderRT();renderCats();}
function save(){localStorage.setItem('bt_q3',JSON.stringify(Q))}
function sw(n,el){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));document.querySelectorAll('.tp').forEach(p=>p.classList.remove('on'));el.classList.add('on');$('p-'+n).classList.add('on');if(n==='dash')renderDash();if(n==='cat')renderCats();}

// ===== DASHBOARD =====
function renderDash(){
  const tot=Q.length,en=Q.filter(q=>q.enabled).length,pub=Q.filter(q=>q.status==='published').length;
  const cats=new Set(Q.map(q=>q.category));
  const uncat=Q.filter(q=>!q.category||q.category==='未分類').length;
  // Dup check (sample)
  const txts=Q.map(q=>q.question);const dupSet=new Set();
  for(let i=0;i<Math.min(txts.length,500);i++)for(let j=i+1;j<Math.min(txts.length,500);j++){if(simRatio(txts[i],txts[j])>.7)dupSet.add(j)}
  const dupRate=(dupSet.size/tot*100).toFixed(1);

  $('dashStats').innerHTML=`
    <div class="st"><div class="n">${tot}</div><div class="l">総質問数</div></div>
    <div class="st"><div class="n">${pub}</div><div class="l">公開中</div></div>
    <div class="st"><div class="n">${cats.size}</div><div class="l">カテゴリ数</div></div>
    <div class="st"><div class="n">${uncat}</div><div class="l">未分類</div></div>
    <div class="st"><div class="n">${dupRate}%</div><div class="l">重複率</div></div>`;

  const byCat={};Q.forEach(q=>{byCat[q.category]=(byCat[q.category]||0)+1});
  $('dashCat').innerHTML=makeBar(byCat,'var(--blue)',null,tot);

  const byScope={common:0,relationship:0,environment:0};Q.forEach(q=>{byScope[q.scope||'common']++});
  $('dashScope').innerHTML=makeBar(byScope,'var(--purple)',SL,tot);
  $('dashScopeTarget').innerHTML=`<div style="padding:10px;background:#F9FAFB;border-radius:8px;font-size:11px;color:var(--s)">

  const byCtx={};Q.forEach(q=>{byCtx[q.context_group]=(byCtx[q.context_group]||0)+1});
  $('dashCtx').innerHTML=makeBar(byCtx,'var(--green)',CL,tot);

  const bySt={published:0,draft:0};Q.forEach(q=>{bySt[q.status||'published']++});

  const byEnv={};Q.forEach(q=>{if(q.environment&&q.environment!=='all')byEnv[q.environment]=(byEnv[q.environment]||0)+1});
  $('dashEnv').innerHTML=makeBar(Object.fromEntries(Object.entries(byEnv).sort((a,b)=>b[1]-a[1]).slice(0,15)),'#3882B6',null,tot);

  $('dashRel').innerHTML=makeBar(Object.fromEntries(Object.entries(byRel).sort((a,b)=>b[1]-a[1]).slice(0,15)),'#C4567A',null,tot);

function makeBar(data,color,labels,total){
  const max=Math.max(...Object.values(data));
  return Object.entries(data).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`
    <div class="bar-r"><span class="bar-l">${labels?labels[k]||k:k}</span>
    <div class="bar-t"><div class="bar-f" style="width:${v/max*100}%;background:${color}"></div></div>
    <span class="bar-v">${v}</span></div>`).join('');
}
function simRatio(a,b){let m=0;const la=a.length,lb=b.length;if(!la||!lb)return 0;for(let i=0;i<la;i++)if(b.includes(a[i]))m++;return m*2/(la+lb)}

// ===== QUALITY CHECK =====
function runQC(){
  qcData=[];
  const DISEASE=/ADHD|ASD|ADD|自閉|アスペ|発達障害|注意欠陥|多動性障害|学習障害|LD|知的障害|精神|うつ|鬱|統合失調|双極|パーソナリティ障害|強迫性|PTSD|HSP/;
  const ABSTRACT=/コミュニケーションが苦手|社会性が低い|能力が不足|知能が|IQが|偏差値|発達が遅|障害がある|病気|症状|治療|診断|障害者/;
  const seen=new Map();

  Q.forEach((q,i)=>{
    const t=q.question;
    // Disease check
    const dm=t.match(DISEASE);if(dm)qcData.push({id:q.id,type:'error',msg:`病名表現検知: "${dm[0]}"`,q:t});
    // Abstract check
    const am=t.match(ABSTRACT);if(am)qcData.push({id:q.id,type:'warn',msg:`抽象表現検知: "${am[0]}"`,q:t});
    // Long text
    if(t.length>60)qcData.push({id:q.id,type:'warn',msg:`長文警告: ${t.length}文字（推奨60文字以内）`,q:t});
    // Short text
    if(t.length<10)qcData.push({id:q.id,type:'warn',msg:`短文警告: ${t.length}文字（内容不足の可能性）`,q:t});
    // Duplicate check
    for(const[prevT,prevId] of seen){
      if(simRatio(t,prevT)>.7)qcData.push({id:q.id,type:'warn',msg:`類似質問検知(${(simRatio(t,prevT)*100).toFixed(0)}%): ${prevId}`,q:t});
    }
    seen.set(t,q.id);
    // No category
    if(!q.category||q.category==='未分類')qcData.push({id:q.id,type:'warn',msg:'カテゴリ未設定',q:t});
  });

  // Add OK count
  const problemIds=new Set(qcData.map(d=>d.id));
  const okCount=Q.length-problemIds.size;
  const errCount=qcData.filter(d=>d.type==='error').length;
  const warnCount=qcData.filter(d=>d.type==='warn').length;

  $('qcStats').innerHTML=`
    <div class="st"><div class="n">${Q.length}</div><div class="l">チェック対象</div></div>
    <div class="st"><div class="n" style="color:var(--red)">${errCount}</div><div class="l">エラー</div></div>
    <div class="st"><div class="n" style="color:var(--orange)">${warnCount}</div><div class="l">警告</div></div>
    <div class="st"><div class="n" style="color:var(--green)">${okCount}</div><div class="l">問題なし</div></div>`;
  filterQC();
}
function filterQC(){
  const f=$('qcFilter').value;
  let items=f==='all'?qcData:f==='error'?qcData.filter(d=>d.type==='error'):f==='warn'?qcData.filter(d=>d.type==='warn'):[];
  if(f==='ok'){
    const pIds=new Set(qcData.map(d=>d.id));
    items=Q.filter(q=>!pIds.has(q.id)).map(q=>({id:q.id,type:'ok',msg:'問題なし',q:q.question}));
  }
  $('qcResults').innerHTML=items.length?items.slice(0,200).map(d=>`
    <div class="qi">
      <div class="qi-icon ${d.type==='error'?'qi-err':d.type==='warn'?'qi-warn':'qi-ok'}">${d.type==='error'?'✕':d.type==='warn'?'⚠':'✓'}</div>
      <span class="qi-id">${d.id}</span>
      <div><div style="font-weight:600;margin-bottom:2px">${d.msg}</div><div style="color:var(--s)">${d.q.slice(0,60)}</div></div>
    </div>`).join(''):`<p style="text-align:center;color:var(--s);padding:30px">該当なし</p>`;
}

// ===== DELIVERY TEST =====
function startTest(){
  const ctx=$('ttCtx').value,my=$('ttMy').value,env=$('ttEnv').value;
  const pool=Q.filter(q=>q.enabled&&q.status==='published');
  const common=pool.filter(q=>q.scope==='common');
  const rel=pool.filter(q=>q.scope==='relationship'&&(q.context_group===ctx||q.context_group==='all')&&(q.my_role==='all'||q.my_role===my));
  const envQ=pool.filter(q=>q.scope==='environment'||(q.environment!=='all'&&env.includes(q.environment)));

  const pick=(a,n)=>[...a].sort(()=>Math.random()-.5).slice(0,n);
  const nC=8,nR=6,nE=6;
  const raw=[...pick(common,nC),...pick(rel,nR),...pick(envQ,nE)];
  const seen=new Set();testQs=[];
  raw.forEach(q=>{if(!seen.has(q.id)){seen.add(q.id);testQs.push(q)}});
  if(testQs.length<10){alert('条件に合う質問が少なすぎます。条件を変えてください。');return}

  testAns={};testIdx=0;
  $('testSetup').style.display='none';$('testArea').style.display='';$('testResult').style.display='none';
  renderTestQ();
}
function renderTestQ(){
  const q=testQs[testIdx];
  const ans=testAns[q.id]||'';
  $('testProg').style.width=((testIdx+1)/testQs.length*100)+'%';
  $('testCount').textContent=`${testIdx+1} / ${testQs.length}`;
  $('testNextBtn').textContent=testIdx===testQs.length-1?'結果を見る →':'次へ →';
  $('testQ').innerHTML=`
    <div class="tq">
      <div class="tq-num">Q${testIdx+1}　<span class="bd bd-c">${q.category}</span>　<span class="bd bd-sc">${SL[q.scope]||''}</span></div>
      <div class="tq-text">${q.question}</div>
      <div class="tq-opts">
        ${['よくある','少しある','ほぼない'].map(o=>`<div class="tq-opt ${ans===o?'sel':''}" onclick="answerTest('${q.id}','${o}')">${o}</div>`).join('')}
      </div>
    </div>`;
}
function answerTest(id,val){testAns[id]=val;renderTestQ()}
function nextTestQ(){
  const q=testQs[testIdx];
  if(!testAns[q.id]){alert('回答を選択してください');return}
  if(testIdx<testQs.length-1){testIdx++;renderTestQ()}
  else showTestResult();
}
function prevTestQ(){if(testIdx>0){testIdx--;renderTestQ()}}
function showTestResult(){
  $('testArea').style.display='none';$('testResult').style.display='';
  // Calculate scores
  const scores={};
  testQs.forEach(q=>{
    const ans=testAns[q.id];
    const mult=ans==='よくある'?3:ans==='少しある'?1.5:0;
    const rm=q.result_mapping||{};
    for(const[type,w] of Object.entries(rm)){scores[type]=(scores[type]||0)+w*mult}
  });
  const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  const topType=sorted[0]?sorted[0][0]:'情報整理支援型';
  const topData=RT.find(r=>r.name===topType)||RT[0];
  const maxScore=sorted[0]?sorted[0][1]:1;

  $('testResult').innerHTML=`
    <div class="cd" style="text-align:center;margin-bottom:14px;border-top:4px solid ${topData.color}">
      <div style="font-size:36px;margin-bottom:8px">${topData.icon}</div>
      <h2 style="font-size:20px;color:${topData.color};margin-bottom:4px">${topData.name}</h2>
      <p style="font-size:13px;color:var(--s);margin-bottom:16px">${topData.summary}</p>
      <p style="font-size:13px;color:var(--s);line-height:1.8;text-align:left">${topData.description}</p>
      <div style="margin-top:12px;font-size:11px;color:var(--s)">※この結果は診断ではありません</div>
    </div>
    <div class="g2">
      <div class="cd"><h3>✓ おすすめの接し方</h3><ul class="rt-tips">${topData.tips.map(t=>`<li>${t}</li>`).join('')}</ul></div>
      <div class="cd"><h3>⭐ この傾向の方の強み</h3><div class="rt-str">${topData.strengths.map(s=>`<span>${s}</span>`).join('')}</div>
        <h3 style="margin-top:16px">📊 スコア内訳</h3>
        ${sorted.map(([type,score])=>`<div class="bar-r"><span class="bar-l" style="width:120px">${type}</span><div class="bar-t"><div class="bar-f" style="width:${score/maxScore*100}%;background:${(RT.find(r=>r.name===type)||{}).color||'var(--blue)'}"></div></div><span class="bar-v">${score.toFixed(0)}</span></div>`).join('')}
      </div>
    </div>
    <div style="margin-top:16px;display:flex;gap:8px">
      <button class="btn bp" onclick="$('testResult').style.display='none';$('testSetup').style.display=''">もう一度テストする</button>
      <button class="btn bo" onclick="sw('rt',document.querySelectorAll('.tab')[4])">結果タイプ一覧を見る</button>
    </div>`;
}

function getF(){const s=$('sI').value.toLowerCase(),cat=$('fCat').value,ctx=$('fCtx').value,scope=$('fSc').value,stat=$('fStat').value;
